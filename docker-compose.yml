services:
  # === БАЗА ДАННЫХ ===
  db:
    image: postgres:14-alpine
    container_name: concrete_db
    environment:
      POSTGRES_USER: concrete_user
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: concrete_map_db
    volumes:
      # Универсальный том для хранения данных (работает везде)
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always

  # === ВЕБ-ПРИЛОЖЕНИЕ ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concrete_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Строка подключения (использует имя сервиса 'db' и нового юзера)
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=concrete_map_db;Username=concrete_user;Password=mysecretpassword;Trust Server Certificate=True
      
      # Настройки JWT (Секретный ключ)
      - JwtSettings__Key=SuperSecretKey_ConcreteMap_2025_LongEnoughToBeSecure!
      - JwtSettings__Issuer=ConcreteMapServer
      - JwtSettings__Audience=ConcreteMapClient
      
      # API Ключ Яндекс.Карт (Ваш ключ уже вписан)
      - YandexMaps__ApiKey=afd7a82d-03c7-4669-99e5-788fcb485888
      
      # Порт внутри контейнера
      - ASPNETCORE_HTTP_PORTS=8080
    
    # Если база не успела запуститься - приложение попробует снова
    restart: on-failure

# Объявление тома для базы данных
volumes:
  postgres_data: